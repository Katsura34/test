<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cipher Tool</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
        }
        .container {
            border: 2px  #908b8b solid;
            padding: 20px;
            border-radius: 8px;
        }
        .section {
            margin-bottom: 20px;
        }
        .button-row {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        label {
            margin-right: 15px;
            cursor: pointer;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #45a049;
        }
        .decrypt-btn {
            background-color: #1f6fb2;
        }
        .decrypt-btn:hover {
            background-color: #195d95;
        }
        #output {
            margin-top: 2px;
            padding: 10px;
            background-color: #f0f0f0;
            border-radius: 4px;
            min-height: 30px;
        }
        
    </style>
</head>
<body>
    <div class="container">
        <h2>Cipher Tool</h2>
        
        <div class="section">
            <h3>Select Cipher Type:</h3>
            <label>
                <input type="radio" name="cipher" value="caesar" checked> Caesar Cipher
            </label>
            <label>
                <input type="radio" name="cipher" value="hill"> Hill Cipher
            </label>
        </div>

        <div class="section">
            <label for="textInput">Enter Text:</label>
            <input type="text" id="textInput" placeholder="Enter text to encrypt or decrypt">
            
            <div id="shiftSection">
                <label for="shiftInput">Enter Shift Value:</label>
                <input type="number" id="shiftInput" value="0" min="0" max="25">
            </div>
        </div>

        <div class="section" id="matrixSection" style="display:none;">
            <h3>Key Matrix Size:</h3>
            <label>
                <input type="radio" name="matrixSize" value="2" checked> 2x2
            </label>
            <label>
                <input type="radio" name="matrixSize" value="3"> 3x3
            </label>
            <div id="matrixInputs" style="margin-top: 10px;"></div>
        </div>

        <div class="button-row">
            <button onclick="processText('encrypt')">Encrypt</button>
            <button class="decrypt-btn" onclick="processText('decrypt')">Decrypt</button>
        </div>
        <label for="output" class="eyy">Output:</label>
        <div id="output"></div>
    </div>

   <script src="script.js"></script>
</body>
</html>
